<!DOCTYPE html>
<html>
<head>
    <title>IESH Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; }
        .card { background-color: #1e1e1e; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .val { font-size: 2em; font-weight: bold; color: #00e676; }
        canvas { max-height: 300px; width: 100%; }
    </style>
</head>
<body>
    <h2>IESH Live Telemetry</h2>

    <div class="grid">
        <div class="card">
            <h3>Air Temp</h3>
            <div class="val" id="air_t">-- °C</div>
        </div>
        <div class="card">
            <h3>Air Humidity</h3>
            <div class="val" id="air_h">-- %</div>
        </div>
        <div class="card">
            <h3>Soil Temp</h3>
            <div class="val" id="soil_t">-- °C</div>
        </div>
        <div class="card">
            <h3>Soil Moisture</h3>
            <div class="val" id="soil_m">-- %</div>
        </div>
    </div>

    <div class="card">
        <canvas id="tempChart"></canvas>
    </div>

    <script>
        let tempChart;

        async function updateData() {
            const response = await fetch('/api/data');
            const data = await response.json();

            if (data.latest) {
                document.getElementById('air_t').innerText = data.latest.air_temp ? data.latest.air_temp.toFixed(1) + ' °C' : 'N/A';
                document.getElementById('air_h').innerText = data.latest.air_hum ? data.latest.air_hum.toFixed(1) + ' %' : 'N/A';
                document.getElementById('soil_t').innerText = data.latest.soil_temp ? data.latest.soil_temp.toFixed(1) + ' °C' : 'N/A';
                document.getElementById('soil_m').innerText = data.latest.soil_moist ? data.latest.soil_moist.toFixed(1) + ' %' : 'N/A';

                updateChart(data.history);
            }
        }

        function updateChart(history) {
            const labels = history.map(row => {
                let d = new Date(row.timestamp);
                return d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
            });
            const airData = history.map(row => row.air_temp);
            const soilData = history.map(row => row.soil_temp);

            if (!tempChart) {
                const ctx = document.getElementById('tempChart').getContext('2d');
                tempChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Air Temp (°C)', borderColor: '#ff5252', data: airData, tension: 0.3 },
                            { label: 'Soil Temp (°C)', borderColor: '#448aff', data: soilData, tension: 0.3 }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            } else {
                tempChart.data.labels = labels;
                tempChart.data.datasets[0].data = airData;
                tempChart.data.datasets[1].data = soilData;
                tempChart.update();
            }
        }

        setInterval(updateData, 10000);
        updateData();
    </script>
</body>
</html>
